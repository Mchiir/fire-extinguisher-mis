worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  upstream auth_service {
    server auth-service:3001;
  }
  upstream user_service {
    server user-service:3002;
  }
  upstream extinguisher_service {
    server extinguisher-service:3003;
  }
  upstream inspection_service {
    server inspection-service:3004;
  }
  upstream maintenance_service {
    server maintenance-service:3005;
  }
  upstream notification_service {
    server notification-service:3006;
  }
  upstream report_service {
    server report-service:3007;
  }
  upstream frontend_app {
    server frontend:5173;
  }

  server {
    listen 8080;
    server_name localhost;

    # CORS for API routes
    add_header Access-Control-Allow-Origin $http_origin always;
    add_header Access-Control-Allow-Credentials true always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, x-service-token" always;

    if ($request_method = OPTIONS) {
      return 204;
    }

    location /api/auth {
      proxy_pass http://auth_service/auth/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Cookie $http_cookie;
    }

    location /api/users {
      proxy_pass http://user_service/users/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location /api/extinguishers {
      proxy_pass http://extinguisher_service/extinguishers/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Authorization $http_authorization;
    }

    location /api/inspections {
      proxy_pass http://inspection_service/inspections/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Authorization $http_authorization;
    }

    location /api/maintenance {
      proxy_pass http://maintenance_service/maintenance/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Authorization $http_authorization;
    }

    location /api/notifications {
      proxy_pass http://notification_service/notifications/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Authorization $http_authorization;
      proxy_set_header x-service-token $http_x_service_token;
    }

    location /api/reports {
      proxy_pass http://report_service/reports/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Authorization $http_authorization;
    }

    # Unified API documentation index
    location = /api/docs {
      default_type text/html;
      return 200 '<!DOCTYPE html><html><head><title>Fire Extinguisher MIS API</title></head><body>
        <h1>Fire Extinguisher MIS — API Documentation</h1>
        <ul>
          <li><a href="/api/auth/api-docs">Auth Service</a></li>
          <li><a href="/api/users/api-docs">User Service</a> (via user-service:3002/api-docs)</li>
        </ul>
        <p>Per-service Swagger is exposed at each service port under <code>/api-docs</code>.</p>
        <ul>
          <li>Auth: port 3001</li>
          <li>Users: 3002</li>
          <li>Extinguishers: 3003</li>
          <li>Inspections: 3004</li>
          <li>Maintenance: 3005</li>
          <li>Notifications: 3006</li>
          <li>Reports: 3007</li>
        </ul>
      </body></html>';
    }

    location / {
      proxy_pass http://frontend_app/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }
  }
}
